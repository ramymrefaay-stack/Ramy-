function addDays(dateStr, days) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split("T")[0];
}
function formatDateAr(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  return d.toLocaleDateString("ar-EG", { year: "numeric", month: "long", day: "numeric" });
}

function getReturnDate(s) {
  if (!s.leaveStart) return "";
  const totalDays = s.totalDays || 15;
  const totalDeducted = (s.deductions || []).reduce((sum, d) => sum + d.days, 0);
  const effectiveDays = totalDays - totalDeducted;
  if (effectiveDays < 1) return "";
  return addDays(s.leaveStart, effectiveDays - 1);
}

function getRemainingDays(s) {
  const totalDays = s.totalDays || 15;
  const totalDeducted = (s.deductions || []).reduce((sum, d) => sum + d.days, 0);
  return totalDays - totalDeducted;
}

// هل الخدمة العسكرية ستنتهي خلال شهرين؟
function isNearServiceEnd(endDate) {
  if (!endDate) return false;
  const today = new Date();
  const end = new Date(endDate);
  const diffMs = end - today;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  return diffDays >= 0 && diffDays <= 60;
}

function DetailView({ soldier, onUpdate, onDelete, onBack }) {
  const [showDeductForm, setShowDeductForm] = useState(false);
  const [deductionInput, setDeductionInput] = useState({ days: "", reason: "" });
  const [deleteConfirm, setDeleteConfirm] = useState(false);
  const photoInputRef = useRef();

  const s = soldier;
  const totalDays = s.totalDays || 15;
  const totalDeducted = (s.deductions || []).reduce((sum, d) => sum + d.days, 0);
  const remaining = getRemainingDays(s);
  const returnDate = getReturnDate(s);
  const nearEnd = isNearServiceEnd(s.serviceEndDate);

  function handlePhotoUpload(e, field) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 300;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        onUpdate({ [field]: canvas.toDataURL("image/jpeg", 0.7) });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file); e.target.value = "";
  }
  function handleAddDeduction() {
    const days = parseInt(deductionInput.days); if (!days || days < 1) return;
    const deduction = { id: Date.now(), days, reason: deductionInput.reason || "خصم إجازة", date: new Date().toISOString().split("T")[0] };
    onUpdate({ deductions: [...(s.deductions || []), deduction] });
    setDeductionInput({ days: "", reason: "" }); setShowDeductForm(false);
  }
  function handleRemoveDeduction(deductId) { onUpdate({ deductions: s.deductions.filter(d => d.id !== deductId) }); }

  return (
    <div style={S.container}>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <button style={S.btn("rgba(255,255,255,0.1)")} onClick={onBack}>← رجوع</button>
        <button style={S.btn("rgba(192,57,43,0.6)")} onClick={() => setDeleteConfirm(true)}>🗑️ حذف العسكري</button>
      </div>

      {deleteConfirm && (
        <div style={S.modalOverlay}><div style={S.modalBox}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>⚠️</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: colors.gold, marginBottom: 8 }}>حذف العسكري</div>
          <div style={{ fontSize: 13, color: "#a0b0c8", marginBottom: 20 }}>هل تريد حذف "{s.name}" من القائمة؟</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...S.btn("rgba(192,57,43,0.9)"), flex: 1 }} onClick={onDelete}>نعم، احذف</button>
            <button style={{ ...S.btn("rgba(255,255,255,0.1)"), flex: 1 }} onClick={() => setDeleteConfirm(false)}>إلغاء</button>
          </div>
        </div></div>
      )}

      {/* الصورة والاسم */}
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14, background: "rgba(255,255,255,0.04)", borderRadius: 14, padding: 14, border: "1px solid rgba(201,162,39,0.2)" }}>
        <div style={{ ...S.avatar, width: 86, height: 86, fontSize: 32, cursor: "pointer", position: "relative" }} onClick={() => photoInputRef.current.click()}>
          {s.photo ? <img src={s.photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span>👤</span>}
          <div style={{ position: "absolute", bottom: 0, right: 0, background: colors.gold, borderRadius: "50%", width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>📷</div>
          <input ref={photoInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handlePhotoUpload(e, "photo")} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 19, fontWeight: 900, color: colors.gold, marginBottom: 6 }}>{s.name}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 16 }}>📞</span>
            <input type="tel" style={{ ...S.input, fontSize: 13, padding: "6px 10px" }}
              placeholder="رقم التليفون"
              value={s.phone || ""}
              onChange={e => onUpdate({ phone: e.target.value })} />
          </div>
        </div>
        <div style={{ textAlign: "center", background: "rgba(0,0,0,0.3)", borderRadius: 12, padding: "10px 18px", border: "1px solid rgba(201,162,39,0.3)" }}>
          <div style={S.remainBig(remaining)}>{remaining}</div>
          <div style={{ fontSize: 11, color: colors.gold, fontWeight: 700 }}>يوم متبقي</div>
        </div>
      </div>

      {/* بيانات الخدمة العسكرية */}
      <div style={{ marginBottom: 14 }}>
        <div style={S.sectionTitle}>🎖️ بيانات الخدمة العسكرية</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {/* تاريخ انتهاء الخدمة */}
          <div style={{ flex: 1, minWidth: 180 }}>
            <label style={S.label}>📅 تاريخ انتهاء الخدمة</label>
            <input type="date" style={{ ...S.input, borderColor: nearEnd ? "rgba(220,50,50,0.7)" : "rgba(201,162,39,0.3)" }}
              value={s.serviceEndDate || ""}
              onChange={e => onUpdate({ serviceEndDate: e.target.value })} />
            {nearEnd && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6, fontSize: 12, color: "#ff6b6b" }}>
                <span className="lamp-red"></span>
                ينتهي خلال أقل من شهرين!
              </div>
            )}
            {s.serviceEndDate && !nearEnd && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6, fontSize: 12, color: "#52d68a" }}>
                <span className="lamp-green"></span>
                {formatDateAr(s.serviceEndDate)}
              </div>
            )}
          </div>
          {/* العمل القائم به */}
          <div style={{ flex: 1, minWidth: 180 }}>
            <label style={S.label}>💼 العمل القائم به</label>
            <input type="text" style={S.input}
              placeholder="مثال: حارس - سائق - كاتب"
              value={s.currentJob || ""}
              onChange={e => onUpdate({ currentJob: e.target.value })} />
          </div>
        </div>
      </div>

      {/* صورة البطاقة */}
      <div style={{ marginBottom: 14 }}>
        <div style={S.sectionTitle}>🏠 العنوان</div>
        <input
          type="text"
          style={S.input}
          placeholder="أدخل عنوان السكن..."
          value={s.address || ""}
          onChange={e => onUpdate({ address: e.target.value })}
        />
      </div>

      {/* بيانات الإجازة */}
      <div style={{ marginBottom: 14 }}>
        <div style={S.sectionTitle}>🏖️ بيانات الإجازة</div>
        <div style={{ background: "rgba(201,162,39,0.1)", border: "1px solid rgba(201,162,39,0.25)", borderRadius: 8, padding: "8px 12px", marginBottom: 10, fontSize: 12, color: colors.goldLight }}>
          ℹ️ الخصم يُطرح من تاريخ العودة — تاريخ النزول ثابت لا يتغير.
        </div>

        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
          <div style={{ flex: 1, minWidth: 160 }}>
            <label style={S.label}>📅 تاريخ النزول</label>
            <input type="date" style={S.input} value={s.leaveStart || ""}
              onChange={e => onUpdate({ leaveStart: e.target.value })} />
          </div>
          <div style={{ flex: 1, minWidth: 160 }}>
            <label style={S.label}>📆 إجمالي أيام الإجازة</label>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button style={{ ...S.btn("rgba(192,57,43,0.7)"), padding: "10px 16px", fontSize: 18 }}
                onClick={() => onUpdate({ totalDays: Math.max(1, totalDays - 1) })}>−</button>
              <div style={{ ...S.input, textAlign: "center", fontSize: 20, fontWeight: 900, color: colors.goldLight, padding: "8px", flex: 1 }}>{totalDays}</div>
              <button style={{ ...S.btn("rgba(26,107,58,0.8)"), padding: "10px 16px", fontSize: 18 }}
                onClick={() => onUpdate({ totalDays: totalDays + 1 })}>+</button>
            </div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
          <div style={S.infoBox}><div style={S.infoLabel}>🟢 إجمالي</div><div style={S.infoValue}>{totalDays} يوم</div></div>
          <div style={S.infoBox}><div style={S.infoLabel}>🔴 مخصوم</div><div style={{ ...S.infoValue, color: "#e74c3c" }}>{totalDeducted} يوم</div></div>
          <div style={S.infoBox}><div style={S.infoLabel}>✅ متبقي</div><div style={{ ...S.infoValue, color: remaining > 7 ? colors.goldLight : remaining > 3 ? "#f39c12" : "#e74c3c" }}>{remaining} يوم</div></div>
        </div>

        {returnDate && (
          <div style={{ background: "rgba(26,107,58,0.2)", border: "1px solid rgba(26,107,58,0.5)", borderRadius: 10, padding: "12px 16px" }}>
            <div style={{ fontSize: 12, color: "#52d68a", fontWeight: 700, marginBottom: 4 }}>🚪 تاريخ العودة</div>
            <div style={{ fontSize: 22, color: colors.white, fontWeight: 800 }}>{formatDateAr(returnDate)}</div>
            {s.leaveStart && (
              <div style={{ fontSize: 11, color: "#8090a8", marginTop: 4 }}>
                نزول: {formatDateAr(s.leaveStart)} ← عودة: {formatDateAr(returnDate)} ({remaining} يوم)
              </div>
            )}
            {totalDeducted > 0 && (
              <div style={{ fontSize: 11, color: "#e74c3c", marginTop: 3 }}>⚠️ تم خصم {totalDeducted} يوم من تاريخ العودة</div>
            )}
          </div>
        )}
      </div>

      {/* الخصومات */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={S.sectionTitle}>✂️ خصم من الإجازة</div>
          <button style={S.btn("rgba(192,57,43,0.75)")} onClick={() => setShowDeductForm(!showDeductForm)}>{showDeductForm ? "إلغاء" : "+ خصم"}</button>
        </div>
        {showDeductForm && (
          <div style={{ background: "rgba(192,57,43,0.1)", border: "1px solid rgba(192,57,43,0.3)", borderRadius: 10, padding: 14, marginBottom: 12 }}>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: 90 }}>
                <label style={S.label}>الأيام</label>
                <input type="number" min="1" style={S.input} placeholder="أيام" value={deductionInput.days} onChange={e => setDeductionInput(p => ({ ...p, days: e.target.value }))} />
              </div>
              <div style={{ flex: 2, minWidth: 150 }}>
                <label style={S.label}>السبب</label>
                <input type="text" style={S.input} placeholder="سبب الخصم" value={deductionInput.reason} onChange={e => setDeductionInput(p => ({ ...p, reason: e.target.value }))} />
              </div>
            </div>
            <button style={{ ...S.btn(`linear-gradient(135deg, ${colors.red}, #e74c3c)`), marginTop: 10, width: "100%" }} onClick={handleAddDeduction}>تأكيد الخصم</button>
          </div>
        )}
        {(s.deductions || []).length === 0 && !showDeductForm && <div style={{ textAlign: "center", color: "#6b7280", padding: 14, fontSize: 13 }}>لا توجد خصومات</div>}
        {(s.deductions || []).map(d => (
          <div key={d.id} style={S.deductRow}>
            <div><div style={{ fontSize: 13, fontWeight: 600 }}>{d.reason}</div><div style={{ fontSize: 11, color: "#8090a8" }}>{formatDateAr(d.date)}</div></div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: "#e74c3c", fontWeight: 800 }}>- {d.days} يوم</span>
              <button style={{ background: "none", border: "none", color: "#e74c3c", cursor: "pointer", fontSize: 17 }} onClick={() => handleRemoveDeduction(d.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>

      {/* ملاحظات */}
      <div>
        <div style={S.sectionTitle}>📝 ملاحظات</div>
        <textarea style={{ ...S.input, height: 90, resize: "vertical" }} placeholder="أي ملاحظات إضافية..." value={s.notes || ""} onChange={e => onUpdate({ notes: e.target.value })} />
      </div>
    </div>
  );
}

function SettingsView({ logoImage, setLogoImage, onClearAll, onBack }) {
  const logoInputRef = useRef();
  function handleLogoUpload(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setLogoImage(ev.target.result);
    reader.readAsDataURL(file); e.target.value = "";
  }
  return (
    <div style={S.container}>
      <div style={{ marginBottom: 16 }}><button style={S.btn("rgba(255,255,255,0.1)")} onClick={onBack}>← رجوع</button></div>
      <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(201,162,39,0.3)", borderRadius: 14, padding: 20, marginBottom: 14 }}>
        <div style={S.sectionTitle}>🎖️ لوجو الإدارة</div>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14 }}>
          <LogoDisplay size={80} logoImage={logoImage} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, color: "#a0b0c8", marginBottom: 10 }}>{logoImage ? "لوجو مخصص مرفوع" : "يستخدم اللوجو الافتراضي حالياً"}</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button style={S.btn(`linear-gradient(135deg, ${colors.gold}, #a07810)`, colors.navy)} onClick={() => logoInputRef.current.click()}>📁 رفع لوجو جديد</button>
              {logoImage && <button style={S.btn("rgba(192,57,43,0.7)")} onClick={() => setLogoImage(null)}>↩️ الافتراضي</button>}
            </div>
          </div>
        </div>
        <input ref={logoInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleLogoUpload} />
      </div>
      <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(192,57,43,0.3)", borderRadius: 14, padding: 20 }}>
        <div style={{ ...S.sectionTitle, color: "#e74c3c", borderColor: "rgba(192,57,43,0.3)" }}>⚠️ منطقة الخطر</div>
        <div style={{ fontSize: 13, color: "#a0b0c8", marginBottom: 14 }}>حذف جميع العساكر من القائمة. لا يمكن التراجع.</div>
        <button style={{ ...S.btn("rgba(192,57,43,0.8)"), width: "100%" }} onClick={onClearAll}>🗑️ مسح جميع العساكر</button>
      </div>
    </div>
  );
}

function AddView({ onAdd, onBack }) {
  const [name, setName] = useState("");
  function handleAdd() { if (!name.trim()) return; onAdd(name.trim()); setName(""); }
  return (
    <div style={S.container}>
      <div style={{ marginBottom: 16 }}><button style={S.btn("rgba(255,255,255,0.1)")} onClick={onBack}>← رجوع</button></div>
      <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(201,162,39,0.3)", borderRadius: 14, padding: 20 }}>
        <div style={S.sectionTitle}>إضافة عسكري جديد</div>
        <label style={S.label}>الاسم الكامل</label>
        <input type="text" style={{ ...S.input, marginBottom: 16 }} placeholder="أدخل اسم العسكري" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAdd()} />
        <button style={{ ...S.btn(`linear-gradient(135deg, ${colors.green}, ${colors.greenLight})`), width: "100%" }} onClick={handleAdd}>إضافة</button>
      </div>
    </div>
  );
}

function ListView({ soldiers, onSelect, onAdd, onClearAll, syncing }) {
  const [hoveredId, setHoveredId] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");

  const filtered = soldiers.filter(s =>
    s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
    (s.currentJob || "").toLowerCase().includes(searchQuery.toLowerCase())
  );

  return (
    <div style={S.container}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: colors.gold }}>قائمة العساكر</div>
          <div style={{ fontSize: 12, color: syncing ? "#52d68a" : "#8090a8", marginTop: 2 }}>
            {syncing ? "🟢 متزامن الآن..." : `${soldiers.length} عنصر مسجل`}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button style={S.btn(`linear-gradient(135deg, ${colors.green}, ${colors.greenLight})`)} onClick={onAdd}>+ إضافة</button>
          {soldiers.length > 0 && <button style={S.btn("rgba(192,57,43,0.7)")} onClick={() => setConfirmClear(true)}>🗑️ مسح الكل</button>}
        </div>
      </div>

      {/* خانة البحث */}
      <div style={{ marginBottom: 14 }}>
        <input
          type="text"
          style={{ ...S.input, width: "auto", maxWidth: 220, fontSize: 13, padding: "7px 12px" }}
          placeholder="🔍 ابحث باسم أو عمل..."
          value={searchQuery}
          onChange={e => setSearchQuery(e.target.value)}
        />
      </div>

      {soldiers.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#6b7280" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>👥</div>
          <div style={{ fontSize: 16, color: "#8090a8" }}>لا يوجد عساكر مسجلين</div>
          <div style={{ fontSize: 13, marginTop: 6 }}>اضغط "إضافة" لإضافة عنصر جديد</div>
        </div>
      )}

      {filtered.length === 0 && soldiers.length > 0 && (
        <div style={{ textAlign: "center", padding: "30px 20px", color: "#6b7280", fontSize: 13 }}>
          لا توجد نتائج للبحث
        </div>
      )}

      {filtered.map(s => {
        const remaining = getRemainingDays(s);
        const returnDate = getReturnDate(s);
        const nearEnd = isNearServiceEnd(s.serviceEndDate);
        return (
          <div key={s.id} style={{ ...S.card, ...(hoveredId === s.id ? { background: "rgba(201,162,39,0.12)", border: `1px solid ${colors.gold}` } : {}) }}
            onMouseEnter={() => setHoveredId(s.id)} onMouseLeave={() => setHoveredId(null)} onClick={() => onSelect(s.id)}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              {/* اللمبة + الصورة */}
              <div style={{ position: "relative", flexShrink: 0 }}>
                <div style={{ ...S.avatar, width: 54, height: 54, fontSize: 22 }}>
                  {s.photo ? <img src={s.photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : "👤"}
                </div>
                {/* النقطة اللمبة */}
                <span
                  className={nearEnd ? "lamp-red" : "lamp-green"}
                  style={{ position: "absolute", bottom: 1, left: 1, width: 12, height: 12 }}
                ></span>
              </div>

              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{s.name}</div>
                </div>
                {s.currentJob && (
                  <div style={{ fontSize: 12, color: colors.goldLight, marginTop: 2 }}>💼 {s.currentJob}</div>
                )}
                {s.phone && <div style={{ fontSize: 12, color: "#8090a8", marginTop: 2 }}>📞 {s.phone}</div>}
                {s.serviceEndDate && (
                  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: nearEnd ? "#ff6b6b" : "#52d68a", marginTop: 3 }}>
                    <span className={nearEnd ? "lamp-red" : "lamp-green"} style={{ width: 8, height: 8 }}></span>
                    انتهاء الخدمة: {formatDateAr(s.serviceEndDate)}
                    {nearEnd && " ⚠️"}
                  </div>
                )}
                <div style={{ display: "flex", gap: 6, marginTop: 5, flexWrap: "wrap" }}>
                  {s.leaveStart && <span style={S.badge("rgba(26,107,58,0.75)")}>نزول: {formatDateAr(s.leaveStart)}</span>}
                  {returnDate && <span style={S.badge("rgba(201,162,39,0.75)")}>عودة: {formatDateAr(returnDate)}</span>}
                  <span style={S.badge(remaining > 7 ? "rgba(26,107,58,0.75)" : remaining > 3 ? "rgba(243,156,18,0.75)" : "rgba(192,57,43,0.75)")}>متبقي: {remaining} يوم</span>
                </div>
              </div>
              <div style={{ color: colors.gold, fontSize: 20 }}>‹</div>
            </div>
          </div>
        );
      })}

      {confirmClear && (
        <div style={S.modalOverlay}><div style={S.modalBox}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>⚠️</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: colors.gold, marginBottom: 8 }}>تأكيد مسح الكل</div>
          <div style={{ fontSize: 13, color: "#a0b0c8", marginBottom: 20 }}>هل أنت متأكد من حذف جميع العساكر؟</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...S.btn("rgba(192,57,43,0.9)"), flex: 1 }} onClick={() => { onClearAll(); setConfirmClear(false); }}>نعم، امسح الكل</button>
            <button style={{ ...S.btn("rgba(255,255,255,0.1)"), flex: 1 }} onClick={() => setConfirmClear(false)}>إلغاء</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

function App() {
  const [soldiers, setSoldiers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [view, setView] = useState("list");
  const [logoImage, setLogoImage] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [dbReady, setDbReady] = useState(false);
  const [saveStatus, setSaveStatus] = React.useState(null);
  const saveTimer = useRef(null);
  const isSaving = useRef(false); // منع الـ listener من الكتابة فوق البيانات

  useEffect(() => {
    if (window.__firebaseReady) { setDbReady(true); return; }
    window.addEventListener("firebaseReady", () => setDbReady(true));
    const timer = setTimeout(() => setDbReady(!!window.__firebaseReady), 5000);
    return () => clearTimeout(timer);
  }, []);

  // ضغط الصورة لأصغر حجم ممكن
  function compressBase64Image(dataUrl, maxSize = 200, quality = 0.5) {
    return new Promise((resolve) => {
      if (!dataUrl || !dataUrl.startsWith("data:image")) { resolve(dataUrl); return; }
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => resolve(null);
      img.src = dataUrl;
    });
  }

  // قراءة البيانات من Firebase مرة واحدة فقط عند التحميل
  useEffect(() => {
    if (!dbReady || !window.__firebase) return;
    const { db, ref, onValue, set } = window.__firebase;
    return onValue(ref(db, "soldiers"), (snapshot) => {
      // لو بنحفظ دلوقتي، متتجاهلش الـ update القادم من Firebase
      if (isSaving.current) return;
      const data = snapshot.val();
      if (data) {
        setSoldiers(Object.values(data));
      } else {
        // أول مرة: ابدأ بالقائمة الافتراضية
        const obj = {};
        initialSoldiers.forEach(s => { obj[s.id] = s; });
        set(ref(db, "soldiers"), obj);
        setSoldiers(initialSoldiers);
      }
      setSyncing(true);
      setTimeout(() => setSyncing(false), 1500);
    });
  }, [dbReady]);

  useEffect(() => {
    if (!dbReady || !window.__firebase) return;
    const { db, ref, onValue } = window.__firebase;
    return onValue(ref(db, "logo"), (snapshot) => { setLogoImage(snapshot.val() || null); });
  }, [dbReady]);

  async function saveToFirebase(updatedSoldiers) {
    if (!window.__firebase) return;
    const { db, ref, set } = window.__firebase;

    // اضغط الصور قبل الحفظ
    const compressed = await Promise.all(updatedSoldiers.map(async (s) => {
      const photo = s.photo ? await compressBase64Image(s.photo) : null;
      return { ...s, photo };
    }));

    const obj = {};
    compressed.forEach(s => { obj[s.id] = s; });

    isSaving.current = true;
    setSaveStatus('saving');
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      set(ref(db, "soldiers"), obj)
        .then(() => {
          setSaveStatus('saved');
          // بعد ما الحفظ يتم، حدّث الـ state بالصور المضغوطة
          setSoldiers(compressed);
          setTimeout(() => {
            setSaveStatus(null);
            isSaving.current = false;
          }, 2000);
        })
        .catch(err => {
          console.error("Firebase save error:", err);
          setSaveStatus('error');
          isSaving.current = false;
          setTimeout(() => setSaveStatus(null), 4000);
        });
    }, 800);
  }

  function saveLogoToFirebase(logo) {
    if (!window.__firebase) return;
    const { db, ref, set } = window.__firebase;
    set(ref(db, "logo"), logo || null);
  }

  const updateSoldier = useCallback((id, fields) => {
    setSoldiers(prev => {
      const updated = prev.map(s => s.id === id ? { ...s, ...fields } : s);
      saveToFirebase(updated); // async - بيضغط الصور وبعدين يحفظ
      return updated;
    });
  }, []);

  function handleAddSoldier(name) {
    const newSoldier = { id: Date.now(), name, phone: "", photo: null, address: "", leaveStart: "", totalDays: 15, deductions: [], notes: "", serviceEndDate: "", currentJob: "" };
    const updated = [...soldiers, newSoldier];
    setSoldiers(updated);
    saveToFirebase(updated);
    setView("list");
  }

  function handleDeleteSoldier() {
    const updated = soldiers.filter(s => s.id !== selected);
    setSoldiers(updated);
    saveToFirebase(updated);
    setSelected(null); setView("list");
  }

  function handleClearAll() {
    if (window.__firebase) {
      const { db, ref, set } = window.__firebase;
      set(ref(db, "soldiers"), null);
    }
    setSoldiers([]); setSelected(null); setView("list");
  }

  function handleSetLogo(logo) { setLogoImage(logo); saveLogoToFirebase(logo); }

  const selectedSoldier = soldiers.find(s => s.id === selected);

  if (!dbReady) return (
    <div style={{ ...S.root, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <div style={{ fontSize: 48 }}>⏳</div>
      <div style={{ color: colors.gold, fontWeight: 700, fontSize: 16 }}>جاري الاتصال بالسيرفر...</div>
      <div style={{ color: "#8090a8", fontSize: 12 }}>يرجى الانتظار</div>
    </div>
  );

  return (
    <div style={S.root}>
      {saveStatus && (
        <div style={{
          position: "fixed", top: 12, left: "50%", transform: "translateX(-50%)",
          background: saveStatus === 'saved' ? "#1a6b3a" : saveStatus === 'error' ? "#c0392b" : "#1a3a6a",
          color: "#fff", padding: "8px 20px", borderRadius: 20,
          fontSize: 13, fontWeight: 700, zIndex: 9999,
          boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
          border: "1px solid rgba(255,255,255,0.2)"
        }}>
          {saveStatus === 'saving' ? '⏳ جاري الحفظ...' : saveStatus === 'saved' ? '✅ تم الحفظ على السيرفر' : '❌ خطأ في الحفظ - البيانات محفوظة محلياً'}
        </div>
      )}
      <div style={S.header}>
        <div style={S.headerInner}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flexShrink: 0 }}>
            <LogoDisplay size={68} logoImage={logoImage} />
            <div style={{ fontSize: 10, fontWeight: 800, color: colors.gold, letterSpacing: 1, textAlign: "center" }}>مجندين</div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 17, fontWeight: 800, color: colors.gold, letterSpacing: 0.5 }}>الإدارة العامة لتحقيق الأدلة الجنائية</div>
            <div style={{ fontSize: 11, color: "#a0b0c8", marginTop: 2 }}>نظام إدارة إجازات العساكر</div>
          </div>
          <button style={{ background: view === "settings" ? "rgba(201,162,39,0.2)" : "rgba(255,255,255,0.07)", border: `1px solid ${view === "settings" ? colors.gold : "rgba(255,255,255,0.1)"}`, borderRadius: 8, padding: "8px 12px", color: colors.gold, cursor: "pointer", fontSize: 18 }}
            onClick={() => setView(view === "settings" ? "list" : "settings")}>⚙️</button>
        </div>
        <div style={S.dividerGold} />
      </div>

      {view === "list" && <ListView soldiers={soldiers} onSelect={id => { setSelected(id); setView("detail"); }} onAdd={() => setView("add")} onClearAll={handleClearAll} syncing={syncing} />}
      {view === "detail" && selectedSoldier && <DetailView key={selectedSoldier.id} soldier={selectedSoldier} onUpdate={fields => updateSoldier(selectedSoldier.id, fields)} onDelete={handleDeleteSoldier} onBack={() => setView("list")} />}
      {view === "add" && <AddView onAdd={handleAddSoldier} onBack={() => setView("list")} />}
      {view === "settings" && <SettingsView logoImage={logoImage} setLogoImage={handleSetLogo} onClearAll={handleClearAll} onBack={() => setView("list")} />}

      <div style={{ textAlign: "center", padding: "20px", color: "rgba(255,255,255,0.15)", fontSize: 11 }}>
        الإدارة العامة لتحقيق الأدلة الجنائية © {new Date().getFullYear()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
